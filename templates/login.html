<!-- templates/login.html -->
{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="form-container">
    <div class="frame">
        <div class="frame-inner">
            <h1>Вход</h1>
            
            {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
            {% endif %}
            
            {% if registered %}
                <div class="alert alert-success">Регистрация успешна! Теперь вы можете войти.</div>
            {% endif %}
            
            <form method="POST" action="{{ url_for('handle_login') }}">
                <div class="form-group">
                    <input type="text" 
                           id="username" 
                           name="username"
                           placeholder="Имя пользователя" 
                           value="{{ form_data.get('username', '') }}"
                           required>
                </div>
                
                <div class="form-group">
                    <input type="password" 
                           id="password" 
                           name="password"
                           placeholder="Пароль"
                           required>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Войти</button>
                    <a href="{{ url_for('show_registration_form') }}" class="btn btn-link">Нет аккаунта? Зарегистрироваться</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
